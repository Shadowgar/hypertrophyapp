[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "core-engine"
version = "0.1.0"
description = "Deterministic hypertrophy progression and scheduling engine"
requires-python = ">=3.12"
dependencies = []

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["core_engine*"]
