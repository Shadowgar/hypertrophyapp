name: CI

on:
  push:
  pull_request:


jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install API deps
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/api/requirements.txt
        pip install -e packages/core-engine
    - name: Run API tests
      run: |
        cd apps/api
        pytest -q

  web-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install web deps
      run: |
        cd apps/web
        npm install
    - name: Lint web
      run: |
        cd apps/web
        npm run lint
