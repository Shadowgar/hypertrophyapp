services:
  postgres:
    image: postgres:16-alpine
    container_name: hypertrophy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hypertrophy}
      POSTGRES_USER: ${POSTGRES_USER:-hypertrophy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hypertrophy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hypertrophy} -d ${POSTGRES_DB:-hypertrophy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: hypertrophy-api
    restart: unless-stopped
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-hypertrophy}
      DATABASE_USER: ${POSTGRES_USER:-hypertrophy}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-hypertrophy}
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      PROGRAMS_DIR: /app/programs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/app/logs/app-debug.log}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES:-5000000}
      LOG_BACKUP_COUNT: ${LOG_BACKUP_COUNT:-5}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://api:8000}
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-dev}
    container_name: hypertrophy-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://api:8000}
    depends_on:
      - api

  caddy:
    image: caddy:2.8-alpine
    container_name: hypertrophy-caddy
    restart: unless-stopped
    ports:
      - "18080:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
